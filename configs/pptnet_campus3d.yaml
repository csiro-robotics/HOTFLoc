# LOSS
LOSS_FUNCTION: 'quadruplet'
LOSS_LAZY: True
TRIPLET_USE_BEST_POSITIVES: False
LOSS_IGNORE_ZERO_BATCH: False

# EVAL6
EVAL_BATCH_SIZE: 1
EVAL_POSITIVES_PER_QUERY: 4
EVAL_NEGATIVES_PER_QUERY: 10
SKIP_SAME_RUN: False

DEGREE: 0

